name: Build Project

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Java
       uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'    # or '11' if your project needs it
          cache: 'maven'

      - name: Run Build
        run: mvn -B clean package
